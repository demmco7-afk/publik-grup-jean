<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JEAN OFFICIAL — SECURE ACCESS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
:root{--neon:#00f2ff;--pink:#ff007f;--purple:#7000ff;--bg:#000810}
html,body{height:100%;background:var(--bg);overflow:hidden;font-family:'Share Tech Mono',monospace;color:var(--neon)}

/* PARTICLES */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

/* GATE UI */
#gate{position:fixed;inset:0;z-index:100;display:flex;justify-content:center;align-items:center;background:radial-gradient(ellipse at center,#001428 0%,#000810 70%)}
.gate-card{width:320px;padding:36px 28px;border:1px solid rgba(0,242,255,0.4);border-radius:24px;background:rgba(0,8,20,0.95);backdrop-filter:blur(20px);box-shadow:0 0 80px rgba(0,242,255,0.1),inset 0 0 40px rgba(0,242,255,0.03);text-align:center;animation:cardIn .6s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes cardIn{from{opacity:0;transform:scale(.8) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}

.shield-icon{width:72px;height:72px;margin:0 auto 20px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--neon));display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 0 40px rgba(0,242,255,0.3),0 0 80px rgba(112,0,255,0.2);animation:shieldPulse 2s ease-in-out infinite}
@keyframes shieldPulse{0%,100%{box-shadow:0 0 40px rgba(0,242,255,0.3),0 0 80px rgba(112,0,255,0.2)}50%{box-shadow:0 0 60px rgba(0,242,255,0.5),0 0 100px rgba(112,0,255,0.35)}}

.gate-title{font-family:'Orbitron',monospace;font-size:1rem;font-weight:900;letter-spacing:3px;color:var(--neon);margin-bottom:4px;text-shadow:0 0 20px var(--neon)}
.gate-sub{font-size:.6rem;letter-spacing:4px;color:rgba(0,242,255,0.4);margin-bottom:24px}

.gate-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,242,255,0.3),transparent);margin:20px 0}

.input-wrap{position:relative;margin-bottom:14px}
.input-wrap input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(0,242,255,0.25);color:white;padding:14px 16px 14px 44px;outline:none;font-family:'Share Tech Mono',monospace;font-size:.85rem;border-radius:14px;transition:border-color .3s,box-shadow .3s;user-select:text!important;-webkit-user-select:text!important;text-align:left;letter-spacing:2px}
.input-wrap input:focus{border-color:var(--neon);box-shadow:0 0 20px rgba(0,242,255,0.15)}
.input-wrap input::placeholder{color:rgba(0,242,255,0.3);letter-spacing:1px}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.9rem;color:rgba(0,242,255,0.5)}

.btn-access{width:100%;padding:14px;background:linear-gradient(135deg,var(--purple),var(--neon));border:none;border-radius:14px;color:white;font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;letter-spacing:3px;cursor:pointer;transition:box-shadow .3s,transform .1s;margin-top:6px}
.btn-access:hover{box-shadow:0 0 30px rgba(0,242,255,0.4)}
.btn-access:active{transform:scale(.98)}
.btn-access:disabled{opacity:.5;cursor:not-allowed}

#err-msg{color:var(--pink);font-size:.68rem;letter-spacing:2px;min-height:18px;margin-top:8px;text-align:center;opacity:0;transition:opacity .3s}
#err-msg.show{opacity:1}

.loading-dots span{animation:dot 1.4s infinite;opacity:0;display:inline-block}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:0}40%{opacity:1}}

.gate-footer{font-size:.55rem;color:rgba(0,242,255,0.2);letter-spacing:2px;margin-top:20px}

/* SCAN LINE */
.scanline{position:fixed;inset:0;z-index:999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,242,255,0.015) 2px,rgba(0,242,255,0.015) 4px);animation:scan 8s linear infinite}
@keyframes scan{0%{background-position:0 0}100%{background-position:0 100px}}

/* FRAME for loaded app */
#app-frame{position:fixed;inset:0;z-index:50;display:none;width:100%;height:100%;border:none}

/* GLITCH on wrong pass */
@keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-3px,3px)}40%{transform:translate(3px,-3px)}60%{transform:translate(-2px,2px)}80%{transform:translate(2px,-2px)}100%{transform:translate(0)}}
.glitch{animation:glitch .3s ease forwards}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="scanline"></div>

<!-- GATE OVERLAY -->
<div id="gate">
  <div class="gate-card" id="gateCard">
    <div class="shield-icon">🔐</div>
    <div class="gate-title">JEAN OFFICIAL</div>
    <div class="gate-sub">SECURE ACCESS PORTAL</div>
    <div class="gate-divider"></div>

    <div class="input-wrap">
      <span class="input-icon">🔑</span>
      <input type="password" id="passInput" placeholder="Masukkan password..." autocomplete="off" spellcheck="false" />
    </div>

    <button class="btn-access" id="btnAccess" onclick="checkPass()">
      ▶ AKSES SEKARANG
    </button>
    <div id="err-msg">⚠ PASSWORD SALAH — AKSES DITOLAK</div>

    <div class="gate-footer">PROTECTED BY TITANIUM SHIELD v2.0</div>
  </div>
</div>

<!-- APP IFRAME (loaded after auth) -->
<iframe id="app-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

<script>
// ============================================================
// ANTI-BOT: Block headless, scrapers, bots
// ============================================================
(function(){
  const ua = navigator.userAgent.toLowerCase();
  const botUA = ['wget','curl','python-requests','go-http','java','scrapy','axios','node-fetch','libwww','okhttp','bot','spider','crawl','fetch','ganz_track','gethtml'];
  if(botUA.some(b => ua.includes(b))) {
    document.body.innerHTML = '<div style="background:#000;color:#ff0000;font-family:monospace;padding:40px;text-align:center;height:100vh;display:flex;align-items:center;justify-content:center;font-size:1.2rem;">⛔ ACCESS DENIED — BOT DETECTED</div>';
    throw new Error('BOT');
  }
  // Must have real browser features
  if(!window.screen || !window.history || !navigator.language) {
    document.body.innerHTML = '<div style="background:#000;color:#f00;font-family:monospace;padding:40px;text-align:center;height:100vh">ACCESS DENIED</div>';
    throw new Error('HEADLESS');
  }
})();

// ============================================================
// PARTICLE SYSTEM
// ============================================================
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
window.addEventListener('resize', resize); resize();

for(let i=0;i<60;i++) particles.push({
  x: Math.random()*2000, y: Math.random()*1000,
  vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
  r: Math.random()*1.5+.3, a: Math.random()
});

function drawParticles(){
  ctx.clearRect(0,0,W,H);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,242,255,${p.a*.5})`;
    ctx.fill();
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function xorDecode(b64){
  const bytes = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const decoded = bytes.map(b => b ^ XOR_KEY);
  return new TextDecoder('utf-8').decode(decoded);
}

let attempts = 0;
const MAX_ATTEMPTS = 5;
let locked = false;
let lockTimer = null;

async function checkPass(){
  if(locked) return;
  const pass = document.getElementById('passInput').value;
  if(!pass) return;

  const btn = document.getElementById('btnAccess');
  btn.disabled = true;
  btn.innerHTML = 'MEMVERIFIKASI <span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>';

  const hash = await sha256(pass);

  if(hash === PASS_HASH){
    // SUCCESS
    attempts = 0;
    btn.innerHTML = '✅ AKSES DIBERIKAN';
    btn.style.background = 'linear-gradient(135deg,#00aa44,#00ffaa)';
    
    setTimeout(()=>{
      // Decode and serve
      const html = xorDecode(ENCODED_DATA);
      const blob = new Blob([html], {type:'text/html'});
      const url = URL.createObjectURL(blob);
      const frame = document.getElementById('app-frame');
      frame.src = url;
      frame.style.display = 'block';
      
      // Fade out gate
      const gate = document.getElementById('gate');
      gate.style.transition = 'opacity .8s ease';
      gate.style.opacity = '0';
      setTimeout(()=>{ gate.style.display='none'; URL.revokeObjectURL(url); }, 800);
    }, 600);

  } else {
    // FAILED
    attempts++;
    const card = document.getElementById('gateCard');
    card.classList.add('glitch');
    setTimeout(()=>card.classList.remove('glitch'), 300);

    const err = document.getElementById('err-msg');
    err.textContent = `⚠ PASSWORD SALAH — PERCOBAAN ${attempts}/${MAX_ATTEMPTS}`;
    err.classList.add('show');

    if(attempts >= MAX_ATTEMPTS){
      locked = true;
      let secs = 30;
      btn.innerHTML = `🔒 TUNGGU ${secs}s`;
      lockTimer = setInterval(()=>{
        secs--;
        btn.innerHTML = `🔒 TUNGGU ${secs}s`;
        if(secs<=0){
          clearInterval(lockTimer);
          locked=false; attempts=0;
          btn.disabled=false;
          btn.innerHTML='▶ AKSES SEKARANG';
          btn.style.background='';
          err.classList.remove('show');
        }
      }, 1000);
    } else {
      btn.disabled = false;
      btn.innerHTML = '▶ AKSES SEKARANG';
    }
    document.getElementById('passInput').value = '';
  }
}

document.getElementById('passInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') checkPass();
});

      e.preventDefault(); e.stopPropagation(); return false;
